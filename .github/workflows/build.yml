name: Build Android APK

on:
  push:
    branches: [ main, develop ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install dependencies
        run: npm ci

      - name: Generate native Android project
        run: npx expo prebuild --clean --platform android

      - name: Limit build to arm64-v8a only
        working-directory: android
        run: |
          sed -i 's/reactNativeArchitectures=.*/reactNativeArchitectures=arm64-v8a/' gradle.properties
          sed -i 's/-Xmx[0-9]*m/-Xmx4096m/' gradle.properties

      - name: Build Debug APK
        working-directory: android
        run: |
          chmod +x gradlew
          ./gradlew assembleDebug --no-daemon -PreactNativeArchitectures=arm64-v8a

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: chatterui-debug
          path: android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 7

      - name: Build Release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon -PreactNativeArchitectures=arm64-v8a

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: chatterui-release
          path: android/app/build/outputs/apk/release/app-release.apk
          retention-days: 30
